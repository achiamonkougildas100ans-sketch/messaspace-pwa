<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MessaSpace - Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .icon {
      width: 96px;
      height: 96px;
      background: #4F46E5;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      color: white;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px rgba(79, 70, 229, 0.4);
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #ffffff;
    }
    p {
      font-size: 1rem;
      color: #9ca3af;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      color: #f87171;
      margin-bottom: 2rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    button {
      background: #4F46E5;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.875rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    button:active { background: #3730a3; }
  </style>
</head>
<body>
  <div class="icon">M</div>
  <h1>Vous êtes hors ligne</h1>
  <p>Impossible de se connecter à MessaSpace. Vérifiez votre connexion Internet et réessayez.</p>
  <div class="status">
    <div class="dot"></div>
    Connexion non disponible
  </div>
  <button onclick="window.location.reload()">Réessayer</button>
  <script>
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
