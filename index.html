    <!-- ===== Patch wouter pour GitHub Pages (base path /messaspace-pwa) ===== -->
    <script>
      (function() {
        var basePath = '/messaspace-pwa';
        // Patch location.pathname pour que wouter voie le chemin sans le préfixe
        var origDescriptor = Object.getOwnPropertyDescriptor(Location.prototype, 'pathname');
        Object.defineProperty(window.location, 'pathname', {
          get: function() {
            var p = origDescriptor.get.call(this);
            if (p.startsWith(basePath)) {
              return p.slice(basePath.length) || '/';
            }
            return p;
          },
          configurable: true
        });
        // Patch history.pushState et replaceState pour ajouter le préfixe
        var origPushState = history.pushState.bind(history);
        var origReplaceState = history.replaceState.bind(history);
        history.pushState = function(state, title, url) {
          if (url && url[0] === '/' && !url.startsWith(basePath)) {
            url = basePath + url;
          }
          return origPushState(state, title, url);
        };
        history.replaceState = function(state, title, url) {
          if (url && url[0] === '/' && !url.startsWith(basePath)) {
            url = basePath + url;
          }
          return origReplaceState(state, title, url);
        };
      })();
    </script>

    <!-- ===== Assets React ===== -->
    <script type="module" crossorigin src="/messaspace-pwa/assets/index-BeQHysT6.js"></script>

  <body>

    <!-- ===== PWA - Service Worker ===== -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/messaspace-pwa/sw.js', { scope: '/messaspace-pwa/' })
            .then(function(registration) {
              console.log('[PWA] Service Worker enregistre :', registration.scope);
            })
            .catch(function(error) {
              console.log('[PWA] Service Worker erreur :', error);
            });
        });
      }
    </script>

    <!-- ===== PWA - Bannière d'installation ===== -->
    <script>
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const banner = document.createElement('div');
        banner.id = 'pwa-install-banner';
        banner.innerHTML = '<div style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e1e2e;border:1px solid #4F46E5;border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(79,70,229,0.35);z-index:99999;max-width:340px;width:calc(100vw - 40px);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;"><img src="/messaspace-pwa/icons/icon-72x72.png" alt="MessaSpace" style="width:48px;height:48px;border-radius:12px;flex-shrink:0;" /><div style="flex:1;min-width:0;"><div style="font-weight:700;color:#fff;font-size:.95rem;">Installer MessaSpace</div><div style="color:#9ca3af;font-size:.8rem;margin-top:2px;">Acces rapide depuis l ecran d accueil</div></div><div style="display:flex;gap:8px;flex-shrink:0;"><button id="pwa-install-btn" style="background:#4F46E5;color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:.85rem;font-weight:600;cursor:pointer;">Installer</button><button id="pwa-dismiss-btn" style="background:transparent;color:#6b7280;border:1px solid #374151;border-radius:10px;padding:8px 10px;font-size:.85rem;cursor:pointer;">X</button></div></div>';
        document.body.appendChild(banner);
        document.getElementById('pwa-install-btn').addEventListener('click', () => {
          banner.remove();
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
        });
        document.getElementById('pwa-dismiss-btn').addEventListener('click', () => { banner.remove(); });
      });
    </script>
  </body>
